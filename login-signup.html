<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Authenticate</title>
    <link rel="stylesheet" href="login-signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="auth-overlay" id="authOverlay"></div>

        <div class="form-box login-box" id="loginBox">
            <h2>Welcome back</h2>
            <p class="subtitle">Please enter your details to sign in.</p>
            
            <form onsubmit="login(event)">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <div class="label-wrapper">
                        <label for="login-password">Password</label>
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <p class="toggle-text">
                Don't have an account? <span id="toSignUp">Sign up</span>
            </p>
        </div>

        <div class="form-box signup-box hidden" id="signupBox">
            <h2>Create an account</h2>
            <p class="subtitle">Get started with your free account today.</p>
            
            <form>
                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="Your Name Here" required>
                </div>
                <div class="input-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Minimum 8 characters" required>
                </div>
                <button type="submit"
             onclick="createNewUser(event)" class="btn-primary">Create Account</button>
            </form>

            <p class="toggle-text">
                Already have an account? <span id="toLogin">Log in</span>
            </p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


    <script src="login-signup.js"></script>
</body>
</html>
