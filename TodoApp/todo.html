<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 ToDo App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="todo.css">
</head>
<body>

<div class="container">

    <div class="header">

        <h1 class="logo"><span>📝</span> ToDoFlow</h1>

        <div class="date-box">

    <div>
        <h2 id="day">Monday</h2>
        <p id="date">1 January 2026</p>
        <span id="time">12:00 PM</span>
    </div>

    <button class="delete-all-btn" onclick="ClearAll()">
        🗑 Delete All
    </button>

</div>

    </div>

    <div class="todo-card">

        <div class="input-box">
            <form onsubmit="ToDoApp(event)">
                <input type="text" placeholder="Add a new task..." id="Todo-Input" required>
                <button>Add Task</button>
            </form>
        </div>

        <ul class="tasks" id="Todo-result">
        </ul>

        <div class="footer">
            Small progress every day creates big results. 🚀
        </div>

    </div>

</div>

      <script src="./todo.js"></script>

</body>
</html>
